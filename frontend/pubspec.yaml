name: steam_cracker_app
description: Mixed-Feed Steam Cracker Decision-Support Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  equatable: ^2.0.5
  amplify_flutter: ^2.3.0
  amplify_auth_cognito: ^2.3.0
  shared_preferences: ^2.3.2
  http: ^1.2.1
  flutter_dotenv: ^5.1.0
  printing: ^5.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env